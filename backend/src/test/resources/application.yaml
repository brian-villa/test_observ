spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VERSION
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: false

api:
  security:
    jwt:
      secret: test-secret-key-for-unit-tests-only-sgmta
      expiration: 86400000

cors:
  allowed-origins: http://localhost:3000
